    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #050505;
        font-family: 'Inter', sans-serif;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }
      
      h1, h2, h3, .font-display {
        font-family: 'Space Grotesk', sans-serif;
      }

      /* Apple Latest Liquid Glass Button Style */
      .liquid-glass-btn {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 
          inset 0 0 12px 0 rgba(255, 255, 255, 0.03),
          0 10px 30px -10px rgba(0, 0, 0, 0.5);
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        overflow: hidden;
      }

      .liquid-glass-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.25);
        transform: translateY(-2px);
        box-shadow: 
          inset 0 0 12px 0 rgba(255, 255, 255, 0.08),
          0 15px 40px -12px rgba(0, 0, 0, 0.6);
      }

      .liquid-glass-btn:active {
        transform: translateY(0) scale(0.96);
        background: rgba(255, 255, 255, 0.08);
      }

      .liquid-glass-btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.05),
          transparent
        );
        transition: 0.6s;
      }

      .liquid-glass-btn:hover::after {
        left: 100%;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.5rem;
      }

      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }

      canvas {
        touch-action: none;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .animate-blink {
        animation: blink 1s step-end infinite;
      }

      @keyframes slide-in-up {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slide-in-right {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      .animate-slide-in-up {
        animation: slide-in-up 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }
      .animate-slide-in-right {
        animation: slide-in-right 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      @keyframes terminal-in {
        from { transform: translateY(20px) scale(0.95); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }
      .animate-terminal-in {
        animation: terminal-in 0.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      .terminal-window {
        box-shadow: 0 0 40px rgba(16, 185, 129, 0.1), 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      }

      .project-card {
        box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.4);
      }
      .project-card:hover {
        box-shadow: 0 12px 40px -8px rgba(0, 0, 0, 0.6);
      }
      .project-card-btn:hover {
        filter: brightness(1.15);
        transform: translateY(-1px);
      }
    </style>
